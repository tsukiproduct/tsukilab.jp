<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Project M Timeline Boot</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050607;
      --panel: #111417;
      --panel-2: #171b20;
      --line: #2b333a;
      --text: #d9fce7;
      --muted: #7e8b85;
      --green: #71ff9b;
      --green-soft: rgba(113, 255, 155, 0.18);
      --amber: #ffd66e;
      --red: #ff6b6b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 50% 0%, #111a16 0%, #050607 46%, #030303 100%);
      color: var(--text);
      font-family: Inter, "Noto Sans JP", system-ui, sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
      letter-spacing: 0;
    }

    .app {
      width: min(1180px, 100%);
      display: grid;
      gap: 16px;
    }

    .stage-shell {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border: 1px solid rgba(113, 255, 155, 0.32);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04),
        0 24px 60px rgba(0, 0, 0, 0.48),
        0 0 40px rgba(113, 255, 155, 0.08);
      overflow: hidden;
      position: relative;
    }

    .terminal {
      position: absolute;
      inset: 0;
      padding: clamp(28px, 4vw, 58px);
      background:
        radial-gradient(circle at 50% 50%, rgba(113, 255, 155, 0.07), transparent 58%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.025), transparent 16%),
        #000;
      font-family: "Cascadia Mono", "Consolas", "Courier New", monospace;
      font-size: clamp(17px, 2vw, 31px);
      line-height: 1.3;
      color: var(--green);
      text-shadow:
        0 0 7px rgba(113, 255, 155, 0.72),
        0 0 18px rgba(113, 255, 155, 0.22);
      overflow: hidden;
    }

    .terminal::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.035) 50%, rgba(0, 0, 0, 0.12) 50%),
        linear-gradient(90deg, rgba(255, 0, 0, 0.018), rgba(0, 255, 64, 0.012), rgba(0, 128, 255, 0.018));
      background-size: 100% 4px, 6px 100%;
      mix-blend-mode: screen;
      opacity: 0.64;
    }

    .terminal::after {
      content: "";
      position: absolute;
      inset: -12%;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 52%, rgba(0, 0, 0, 0.62) 100%);
      opacity: 0.9;
    }

    .terminal.flash {
      animation: flashOut 760ms ease-out forwards;
    }

    .screen-jitter {
      position: absolute;
      inset: 0;
      padding: inherit;
      transform-origin: center;
      animation: crtJitter 180ms steps(2, end) infinite;
      z-index: 1;
    }

    .boot-lines {
      width: min(900px, 88%);
      white-space: pre-wrap;
      word-break: keep-all;
    }

    .line {
      display: block;
      min-height: 1.3em;
      opacity: 0.96;
    }

    .line.dim {
      color: #a1cdb1;
      opacity: 0.72;
      text-shadow: 0 0 5px rgba(113, 255, 155, 0.42);
    }

    .line.warn {
      color: var(--amber);
      text-shadow: 0 0 8px rgba(255, 214, 110, 0.55);
    }

    .line.hot {
      color: #f2fff6;
      text-shadow:
        0 0 8px rgba(242, 255, 246, 0.9),
        0 0 22px rgba(113, 255, 155, 0.38);
    }

    .cursor {
      display: inline-block;
      width: 0.62em;
      height: 1em;
      margin-left: 0.1em;
      background: var(--green);
      box-shadow: 0 0 10px rgba(113, 255, 155, 0.9);
      transform: translateY(0.14em);
      animation: blink 720ms steps(1, end) infinite;
    }

    .status-bar {
      position: absolute;
      left: clamp(28px, 4vw, 58px);
      right: clamp(28px, 4vw, 58px);
      bottom: clamp(22px, 3vw, 42px);
      display: grid;
      gap: 8px;
      z-index: 2;
      font-family: "Cascadia Mono", "Consolas", "Courier New", monospace;
      color: #bdf8cd;
      opacity: 0;
      transition: opacity 320ms ease;
    }

    .status-bar.visible {
      opacity: 1;
    }

    .meter {
      height: 10px;
      border: 1px solid rgba(113, 255, 155, 0.48);
      background: rgba(113, 255, 155, 0.06);
      overflow: hidden;
    }

    .meter-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, rgba(113, 255, 155, 0.68), rgba(242, 255, 246, 0.95));
      box-shadow: 0 0 16px rgba(113, 255, 155, 0.5);
      transition: width 120ms linear;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: stretch;
      background: rgba(17, 20, 23, 0.86);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
    }

    .control-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(110px, 1fr));
      gap: 8px;
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button,
    select,
    input {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
      padding: 0 12px;
    }

    button {
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    button:hover {
      border-color: rgba(113, 255, 155, 0.7);
      background: #1b2420;
    }

    button:active {
      transform: translateY(1px);
    }

    .primary {
      background: var(--green);
      color: #041007;
      border-color: var(--green);
      font-weight: 700;
    }

    .primary:hover {
      background: #93ffb2;
    }

    .toggle.active {
      border-color: var(--green);
      box-shadow: inset 0 0 0 1px rgba(113, 255, 155, 0.25);
    }

    .hidden-for-recording .controls {
      display: none;
    }

    .hidden-for-recording {
      padding: 0;
      background: #000;
    }

    .hidden-for-recording .app {
      width: 100vw;
    }

    .hidden-for-recording .stage-shell {
      border: 0;
      box-shadow: none;
    }

    @keyframes blink {
      0%, 48% { opacity: 1; }
      49%, 100% { opacity: 0; }
    }

    @keyframes crtJitter {
      0% { transform: translate(0, 0); }
      50% { transform: translate(0.6px, -0.4px); }
      100% { transform: translate(-0.4px, 0.4px); }
    }

    @keyframes flashOut {
      0% { filter: brightness(1); }
      36% { filter: brightness(2.8) blur(0.2px); }
      100% { filter: brightness(8) blur(2px); }
    }

    @media (max-width: 820px) {
      body {
        padding: 12px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .control-grid {
        grid-template-columns: 1fr 1fr;
      }

      .actions {
        justify-content: stretch;
      }

      .actions button {
        flex: 1 1 120px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="stage-shell" aria-label="録画用16:9ステージ">
      <div id="terminal" class="terminal">
        <div class="screen-jitter">
          <div id="bootLines" class="boot-lines"></div>
        </div>
        <div id="statusBar" class="status-bar">
          <span id="statusText">SYNCING...</span>
          <div class="meter"><div id="meterFill" class="meter-fill"></div></div>
        </div>
      </div>
    </section>

    <section class="controls" aria-label="操作パネル">
      <div class="control-grid">
        <select id="presetSelect" aria-label="年代プリセット"></select>
        <select id="durationSelect" aria-label="再生尺">
          <option value="2600">2.6s</option>
          <option value="3200" selected>3.2s</option>
          <option value="4200">4.2s</option>
          <option value="5200">5.2s</option>
        </select>
        <select id="themeSelect" aria-label="色テーマ">
          <option value="green" selected>green phosphor</option>
          <option value="white">white terminal</option>
          <option value="amber">amber monitor</option>
        </select>
        <input id="customTitle" type="text" aria-label="カスタムタイトル" placeholder="TITLE override">
      </div>
      <div class="actions">
        <button id="playButton" class="primary" type="button">Play</button>
        <button id="restartButton" type="button">Restart</button>
        <button id="soundButton" class="toggle" type="button">Sound Off</button>
        <button id="fullscreenButton" type="button">Fullscreen</button>
        <button id="recordModeButton" class="toggle" type="button">Record UI</button>
      </div>
    </section>
  </main>

  <script>
    const presets = [
      {
        id: "1920",
        label: "1920 / Steam Locomotive Peach",
        year: "1920",
        title: "STEAM LOCOMOTIVE PEACH",
        format: "RUBBER_HOSE_MONOCHROME",
        color: "BLACK_WHITE_GRAY",
        route: "PEACH_WORLD",
        memory: "MOMOE_CORE_TRACE"
      },
      {
        id: "1960",
        label: "1960 / Machikado Hanako Chan",
        year: "1960",
        title: "MACHIKADO HANAKO CHAN",
        format: "RETRO_CEL_ANIMATION",
        color: "SOFT_SEPIA_CEL",
        route: "NEIGHBORHOOD_LAYER",
        memory: "FIRST_ANIME_TRACE"
      },
      {
        id: "1970",
        label: "1970 / Super Robot Layer",
        year: "1970",
        title: "SUPER ROBOT SIGNAL",
        format: "BOLD_CEL_ACTION",
        color: "PRIMARY_COLOR_CEL",
        route: "MECHANICAL_HERO_LAYER",
        memory: "COURAGE_TRACE"
      },
      {
        id: "1980",
        label: "1980 / Magical / Idol Layer",
        year: "1980",
        title: "MAGICAL IDOL BROADCAST",
        format: "HIGH_ENERGY_CEL",
        color: "NEON_PASTEL_CEL",
        route: "STAGE_LIGHT_LAYER",
        memory: "WISH_TRACE"
      },
      {
        id: "1990",
        label: "1990 / Digital Battle Layer",
        year: "1990",
        title: "DIGITAL BATTLE ARCHIVE",
        format: "SHARP_TV_ANIME",
        color: "COOL_CONTRAST_CEL",
        route: "SYSTEM_GLITCH_LAYER",
        memory: "CONFLICT_TRACE"
      },
      {
        id: "2000",
        label: "2000 / Desert Parade Layer",
        year: "2000",
        title: "DESERT PARADE CHRONICLE",
        format: "DIGITAL_ANIME_WORLD",
        color: "SUNLIT_DIGITAL_CEL",
        route: "FINAL_TRAUMA_LAYER",
        memory: "EMI_CORE_TRACE"
      },
      {
        id: "2026",
        label: "2026 / Reality Return",
        year: "2026",
        title: "REALITY RETURN SEQUENCE",
        format: "LIVE_MEMORY_SYNC",
        color: "REAL_WORLD_COLOR",
        route: "CAR_INTERIOR_LAYER",
        memory: "WAKE_SIGNAL"
      }
    ];

    const bootLines = document.getElementById("bootLines");
    const terminal = document.getElementById("terminal");
    const statusBar = document.getElementById("statusBar");
    const statusText = document.getElementById("statusText");
    const meterFill = document.getElementById("meterFill");
    const presetSelect = document.getElementById("presetSelect");
    const durationSelect = document.getElementById("durationSelect");
    const themeSelect = document.getElementById("themeSelect");
    const customTitle = document.getElementById("customTitle");
    const playButton = document.getElementById("playButton");
    const restartButton = document.getElementById("restartButton");
    const soundButton = document.getElementById("soundButton");
    const fullscreenButton = document.getElementById("fullscreenButton");
    const recordModeButton = document.getElementById("recordModeButton");

    let timers = [];
    let currentRun = 0;
    let soundEnabled = false;
    let audioContext = null;

    for (const preset of presets) {
      const option = document.createElement("option");
      option.value = preset.id;
      option.textContent = preset.label;
      presetSelect.appendChild(option);
    }

    function selectedPreset() {
      return presets.find((preset) => preset.id === presetSelect.value) || presets[0];
    }

    function clearTimers() {
      for (const timer of timers) window.clearTimeout(timer);
      timers = [];
    }

    function audio() {
      if (!soundEnabled) return null;
      audioContext ||= new (window.AudioContext || window.webkitAudioContext)();
      return audioContext;
    }

    function beep(freq = 720, duration = 0.035, gain = 0.035, type = "square") {
      const ctx = audio();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const amp = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      amp.gain.setValueAtTime(0.0001, ctx.currentTime);
      amp.gain.exponentialRampToValueAtTime(gain, ctx.currentTime + 0.006);
      amp.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
      osc.connect(amp);
      amp.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + duration + 0.01);
    }

    function wait(ms, runId, callback) {
      const timer = window.setTimeout(() => {
        if (runId === currentRun) callback();
      }, ms);
      timers.push(timer);
    }

    function setTheme(theme) {
      const styles = {
        green: ["#71ff9b", "rgba(113, 255, 155, 0.18)"],
        white: ["#f2fff6", "rgba(242, 255, 246, 0.16)"],
        amber: ["#ffd66e", "rgba(255, 214, 110, 0.18)"]
      };
      const [main, soft] = styles[theme] || styles.green;
      document.documentElement.style.setProperty("--green", main);
      document.documentElement.style.setProperty("--green-soft", soft);
    }

    function buildScript(preset) {
      const title = customTitle.value.trim() || preset.title;
      return [
        { text: "PROJECT_M_TIMELINE_BOOT", cls: "hot" },
        { text: "ACCESSING MEMORY LAYER...", cls: "dim" },
        { text: "VERIFYING SUBJECT: EMI / MOMOE", cls: "dim" },
        { text: `YEAR: ${preset.year}`, cls: "hot" },
        { text: `TITLE: ${title}`, cls: "hot" },
        { text: `FORMAT: ${preset.format}`, cls: "dim" },
        { text: `COLOR_PROFILE: ${preset.color}`, cls: "dim" },
        { text: `ROUTE: ${preset.route}`, cls: "dim" },
        { text: `MEMORY_TRACE: ${preset.memory}`, cls: "warn" },
        { text: "LOCKING ERA STYLE...", cls: "dim" },
        { text: "SYNCING EMOTION_TRACE...", cls: "warn" },
        { text: "ANIME_WORLD_READY", cls: "hot" },
        { text: "START...", cls: "hot" }
      ];
    }

    function appendLine(text, cls = "") {
      const line = document.createElement("span");
      line.className = `line ${cls}`.trim();
      bootLines.appendChild(line);
      return typeLine(line, text);
    }

    function typeLine(element, text) {
      const chars = Array.from(text);
      const burst = text.length > 28 ? 5 : 3;
      let index = 0;
      return new Promise((resolve) => {
        const tick = () => {
          index += burst;
          element.textContent = chars.slice(0, index).join("");
          beep(580 + Math.random() * 160, 0.018, 0.018, "square");
          if (index < chars.length) {
            window.setTimeout(tick, 18 + Math.random() * 18);
          } else {
            resolve();
          }
        };
        tick();
      });
    }

    function updateMeter(progress) {
      meterFill.style.width = `${Math.max(0, Math.min(100, progress))}%`;
      statusText.textContent = progress < 100 ? `SYNC ${String(Math.round(progress)).padStart(3, "0")}%` : "TRANSFER COMPLETE";
    }

    async function play() {
      clearTimers();
      const runId = ++currentRun;
      const preset = selectedPreset();
      const duration = Number(durationSelect.value);
      const script = buildScript(preset);
      const lineDelay = Math.max(24, Math.floor(duration / (script.length * 1.65)));

      terminal.classList.remove("flash");
      bootLines.innerHTML = "";
      statusBar.classList.remove("visible");
      meterFill.style.width = "0%";

      await appendLine("> INITIALIZE TRANSFER", "dim");
      beep(220, 0.12, 0.035, "sawtooth");
      for (let i = 0; i < script.length; i += 1) {
        if (runId !== currentRun) return;
        if (i === 3) statusBar.classList.add("visible");
        await appendLine(script[i].text, script[i].cls);
        updateMeter((i + 1) / script.length * 100);
        await new Promise((resolve) => window.setTimeout(resolve, lineDelay));
      }

      const cursor = document.createElement("span");
      cursor.className = "cursor";
      bootLines.lastElementChild.appendChild(cursor);

      wait(340, runId, () => terminal.classList.add("flash"));
      wait(360, runId, () => beep(980, 0.22, 0.05, "triangle"));
      wait(1060, runId, () => {
        terminal.classList.remove("flash");
        bootLines.innerHTML = "";
        statusBar.classList.remove("visible");
      });
    }

    function restart() {
      play();
    }

    function toggleRecordMode() {
      document.body.classList.toggle("hidden-for-recording");
      recordModeButton.classList.toggle("active", document.body.classList.contains("hidden-for-recording"));
      recordModeButton.textContent = document.body.classList.contains("hidden-for-recording") ? "Show UI" : "Record UI";
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      soundButton.classList.toggle("active", soundEnabled);
      soundButton.textContent = soundEnabled ? "Sound On" : "Sound Off";
      if (soundEnabled) beep(440, 0.08, 0.035, "triangle");
    }

    async function fullscreenStage() {
      const stage = document.querySelector(".stage-shell");
      if (!document.fullscreenElement) {
        await stage.requestFullscreen();
      } else {
        await document.exitFullscreen();
      }
    }

    playButton.addEventListener("click", play);
    restartButton.addEventListener("click", restart);
    soundButton.addEventListener("click", toggleSound);
    fullscreenButton.addEventListener("click", fullscreenStage);
    recordModeButton.addEventListener("click", toggleRecordMode);
    presetSelect.addEventListener("change", play);
    themeSelect.addEventListener("change", () => {
      setTheme(themeSelect.value);
      play();
    });
    durationSelect.addEventListener("change", play);

    window.addEventListener("keydown", (event) => {
      if (event.code === "Space") {
        event.preventDefault();
        play();
      }
      if (event.key.toLowerCase() === "r") restart();
      if (event.key.toLowerCase() === "h") toggleRecordMode();
      if (event.key.toLowerCase() === "f") fullscreenStage();
    });

    setTheme("green");
    play();
  </script>
</body>
</html>
