<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>PROJECT M — Prompt Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0f0c1c;
  --ink-soft: #1a1530;
  --paper: #faf7f2;
  --gold: #c9a55c;
  --gold-light: #e8c97a;
  --gold-deep: #8a6a32;
  --lavender: #d4c5f9;
  --dawn: #f7d5dc;
  --sky: #c9d6ff;
  --surface: rgba(255,255,255,0.04);
  --border: rgba(232,201,122,0.18);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Shippori Mincho', serif;
  background: var(--ink);
  color: #e8e4dc;
  min-height: 100vh;
  overflow-x: hidden;
}

/* 背景グレイン */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* ヘッダー */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(20px);
  background: rgba(15,12,28,0.85);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.8rem;
  letter-spacing: 0.4em;
  color: var(--gold-light);
  text-transform: uppercase;
}

.warning-badge {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: rgba(201,165,92,0.08);
  border: 1px solid rgba(201,165,92,0.3);
  border-radius: 999px;
  padding: 0.35rem 0.9rem;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  color: var(--gold-light);
}

.warning-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--gold-light);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

/* メインレイアウト */
main {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 3rem 2rem;
}

/* 著作権注意書き */
.copyright-notice {
  background: linear-gradient(135deg, rgba(212,197,249,0.06), rgba(201,165,92,0.06));
  border: 1px dashed rgba(201,165,92,0.35);
  border-radius: 12px;
  padding: 1.25rem 1.75rem;
  margin-bottom: 3rem;
  display: flex;
  gap: 1rem;
  align-items: flex-start;
}

.notice-icon {
  font-size: 1.1rem;
  flex-shrink: 0;
  margin-top: 0.1rem;
}

.notice-text {
  font-size: 0.78rem;
  line-height: 1.9;
  color: rgba(232,228,220,0.85);
}

.notice-text strong {
  color: var(--gold-light);
  font-weight: 600;
}

/* セクションタイトル */
.section-label {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.72rem;
  letter-spacing: 0.4em;
  color: var(--gold-deep);
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}

h2 {
  font-size: 1.5rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
  color: #fff;
}

/* 入力フォーム */
.form-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2rem;
  margin-bottom: 3rem;
  backdrop-filter: blur(8px);
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem;
  margin-bottom: 1.25rem;
}

@media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } }

.field-label {
  display: block;
  font-size: 0.68rem;
  letter-spacing: 0.25em;
  color: var(--gold-deep);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
}

input[type="text"], select, textarea {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(232,201,122,0.2);
  border-radius: 8px;
  padding: 0.75rem 1rem;
  color: #e8e4dc;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  outline: none;
  transition: border-color 0.3s;
  -webkit-appearance: none;
}

input[type="text"]:focus,
select:focus,
textarea:focus {
  border-color: var(--gold);
}

select option { background: var(--ink-soft); }

textarea {
  resize: vertical;
  min-height: 140px;
  line-height: 1.7;
}

.tags-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-top: 0.5rem;
}

.tag-btn {
  padding: 0.3rem 0.8rem;
  border-radius: 999px;
  border: 1px solid rgba(232,201,122,0.25);
  background: transparent;
  color: rgba(232,228,220,0.6);
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Cormorant Garamond', serif;
}

.tag-btn:hover,
.tag-btn.active {
  background: rgba(201,165,92,0.15);
  border-color: var(--gold);
  color: var(--gold-light);
}

.submit-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.85rem 2rem;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  color: #1a1200;
  border: none;
  border-radius: 999px;
  font-family: 'Shippori Mincho', serif;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 6px 24px rgba(201,165,92,0.3);
  margin-top: 1.5rem;
}

.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 32px rgba(201,165,92,0.45);
}

/* フィルターバー */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
  align-items: center;
}

.filter-label {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.72rem;
  color: var(--gold-deep);
  letter-spacing: 0.2em;
  margin-right: 0.25rem;
}

.filter-chip {
  padding: 0.3rem 0.9rem;
  border-radius: 999px;
  border: 1px solid rgba(232,201,122,0.2);
  background: transparent;
  color: rgba(232,228,220,0.55);
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Cormorant Garamond', serif;
}

.filter-chip:hover,
.filter-chip.active {
  background: rgba(201,165,92,0.12);
  border-color: var(--gold);
  color: var(--gold-light);
}

/* プロンプトカード一覧 */
.prompts-grid {
  display: grid;
  gap: 1rem;
}

.prompt-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(232,201,122,0.12);
  border-radius: 14px;
  padding: 1.5rem;
  transition: all 0.4s;
  position: relative;
  overflow: hidden;
}

.prompt-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(212,197,249,0.03), rgba(201,165,92,0.03));
  opacity: 0;
  transition: opacity 0.4s;
}

.prompt-card:hover {
  border-color: rgba(232,201,122,0.3);
  transform: translateY(-2px);
}

.prompt-card:hover::before { opacity: 1; }

.card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 0.75rem;
}

.card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  align-items: center;
}

.tool-badge {
  padding: 0.2rem 0.65rem;
  border-radius: 999px;
  font-size: 0.62rem;
  letter-spacing: 0.15em;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
}

.tool-kling    { background: rgba(212,197,249,0.15); color: var(--lavender); border: 1px solid rgba(212,197,249,0.3); }
.tool-pixverse { background: rgba(201,165,92,0.12); color: var(--gold-light); border: 1px solid rgba(201,165,92,0.3); }
.tool-runway   { background: rgba(247,213,220,0.12); color: var(--dawn); border: 1px solid rgba(247,213,220,0.3); }
.tool-sora     { background: rgba(201,214,255,0.12); color: var(--sky); border: 1px solid rgba(201,214,255,0.3); }
.tool-midjourney { background: rgba(255,255,255,0.06); color: #ccc; border: 1px solid rgba(255,255,255,0.15); }
.tool-gptimage { background: rgba(100,220,180,0.1); color: #7ef0cc; border: 1px solid rgba(100,220,180,0.25); }
.tool-other    { background: rgba(255,255,255,0.04); color: rgba(232,228,220,0.6); border: 1px solid rgba(255,255,255,0.1); }

.author-tag {
  font-size: 0.65rem;
  color: rgba(232,228,220,0.45);
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
}

.card-date {
  font-size: 0.62rem;
  color: rgba(232,228,220,0.3);
  font-family: 'JetBrains Mono', monospace;
  flex-shrink: 0;
}

.card-title {
  font-size: 0.95rem;
  font-weight: 600;
  color: #fff;
  margin-bottom: 0.6rem;
  line-height: 1.5;
}

.card-prompt {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  line-height: 1.8;
  color: rgba(232,228,220,0.6);
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 5.4em;
  overflow: hidden;
  position: relative;
  transition: max-height 0.4s;
}

.card-prompt.expanded { max-height: 1000px; }

.card-prompt::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2em;
  background: linear-gradient(transparent, rgba(15,12,28,0.95));
  pointer-events: none;
  transition: opacity 0.3s;
}

.card-prompt.expanded::after { opacity: 0; }

.card-actions {
  display: flex;
  gap: 0.5rem;
  margin-top: 1rem;
  align-items: center;
}

.action-btn {
  padding: 0.3rem 0.8rem;
  border-radius: 6px;
  border: 1px solid rgba(232,201,122,0.2);
  background: transparent;
  color: rgba(232,228,220,0.55);
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Cormorant Garamond', serif;
}

.action-btn:hover {
  background: rgba(201,165,92,0.1);
  border-color: var(--gold);
  color: var(--gold-light);
}

.copy-success {
  font-size: 0.65rem;
  color: #7ef0cc;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  opacity: 0;
  transition: opacity 0.3s;
}

.copy-success.show { opacity: 1; }

/* 空状態 */
.empty-state {
  text-align: center;
  padding: 4rem 2rem;
  color: rgba(232,228,220,0.3);
}

.empty-state p {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1rem;
  margin-top: 0.5rem;
}

/* 区切り線 */
.ornament {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin: 2.5rem 0;
}

.ornament::before, .ornament::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(232,201,122,0.3), transparent);
}

.ornament span {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  color: var(--gold-deep);
}

/* トースト */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--gold);
  color: #1a1200;
  padding: 0.75rem 1.5rem;
  border-radius: 999px;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  transition: transform 0.4s cubic-bezier(.16,1,.3,1);
  z-index: 999;
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* 統計 */
.stats-row {
  display: flex;
  gap: 1.5rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}

.stat-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.75rem 1.25rem;
  text-align: center;
}

.stat-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem;
  color: var(--gold-light);
  line-height: 1;
  margin-bottom: 0.2rem;
}

.stat-lbl {
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  color: rgba(232,228,220,0.4);
  font-family: 'Cormorant Garamond', serif;
}
</style>
</head>
<body>

<header>
  <div class="logo">Project M — Prompt Archive</div>
  <div class="warning-badge">
    <span class="warning-dot"></span>
    チーム内限定・第三者共有禁止
  </div>
</header>

<main>

  <!-- 著作権注意書き -->
  <div class="copyright-notice">
    <span class="notice-icon">⚠️</span>
    <p class="notice-text">
      <strong>プロンプトは著作物です。</strong>
      このアーカイブに保存されたプロンプトはProject Mチームメンバーの創作物であり、チーム外への共有・転載・無断使用を固く禁じます。
      コロテックコンテスト規約により、<strong>参加登録〜7月中旬までAIプロンプトの第三者提出物利用許諾は禁止</strong>されています。
      取り扱いには最大限の注意を払ってください。
    </p>
  </div>

  <!-- 入力フォーム -->
  <div class="section-label">— New Entry —</div>
  <h2>プロンプトを追加</h2>

  <div class="form-card" style="margin-top:1rem;">
    <div class="form-grid">
      <div>
        <label class="field-label">タイトル</label>
        <input type="text" id="inp-title" placeholder="例：オープニングシーン・空飛ぶシルエット">
      </div>
      <div>
        <label class="field-label">投稿者</label>
        <select id="inp-author">
          <option value="">— メンバーを選択 —</option>
          <option value="月真猫">月真猫</option>
          <option value="杜崎まさかず">杜崎まさかず</option>
          <option value="夢逢真月里">夢逢真月里</option>
          <option value="HIROMI">HIROMI</option>
          <option value="TECH">TECH</option>
        </select>
      </div>
    </div>

    <div style="margin-bottom:1.25rem;">
      <label class="field-label">使用ツール</label>
      <div class="tags-row" id="tool-tags">
        <button class="tag-btn" data-tool="Kling">Kling</button>
        <button class="tag-btn" data-tool="PixVerse">PixVerse</button>
        <button class="tag-btn" data-tool="Runway">Runway</button>
        <button class="tag-btn" data-tool="Sora">Sora</button>
        <button class="tag-btn" data-tool="Midjourney">Midjourney</button>
        <button class="tag-btn" data-tool="GPT Image">GPT Image</button>
        <button class="tag-btn" data-tool="Seedance">Seedance</button>
        <button class="tag-btn" data-tool="Vidu">Vidu</button>
        <button class="tag-btn" data-tool="Hailuo">Hailuo</button>
        <button class="tag-btn" data-tool="Luma">Luma</button>
        <button class="tag-btn" data-tool="その他">その他</button>
      </div>
    </div>

    <div>
      <label class="field-label">プロンプト本文</label>
      <textarea id="inp-prompt" placeholder="プロンプトをここに貼り付けてください..."></textarea>
    </div>

    <div style="margin-top:1.25rem;">
      <label class="field-label">メモ・補足（任意）</label>
      <input type="text" id="inp-memo" placeholder="例：結果が良かった設定、パラメーター、注意点など">
    </div>

    <button class="submit-btn" onclick="savePrompt()">
      ＋ アーカイブに保存
    </button>
  </div>

  <div class="ornament"><span>Archive</span></div>

  <!-- 統計 -->
  <div class="stats-row" id="stats-row">
    <div class="stat-item">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-lbl">Total</div>
    </div>
  </div>

  <!-- フィルターバー -->
  <div class="filter-bar">
    <span class="filter-label">Filter:</span>
    <button class="filter-chip active" data-filter="ALL" onclick="setFilter('ALL', this)">すべて</button>
    <button class="filter-chip" data-filter="Kling" onclick="setFilter('Kling', this)">Kling</button>
    <button class="filter-chip" data-filter="PixVerse" onclick="setFilter('PixVerse', this)">PixVerse</button>
    <button class="filter-chip" data-filter="Runway" onclick="setFilter('Runway', this)">Runway</button>
    <button class="filter-chip" data-filter="Sora" onclick="setFilter('Sora', this)">Sora</button>
    <button class="filter-chip" data-filter="Midjourney" onclick="setFilter('Midjourney', this)">Midjourney</button>
    <button class="filter-chip" data-filter="GPT Image" onclick="setFilter('GPT Image', this)">GPT Image</button>
    <button class="filter-chip" data-filter="Seedance" onclick="setFilter('Seedance', this)">Seedance</button>
    <button class="filter-chip" data-filter="その他" onclick="setFilter('その他', this)">その他</button>
  </div>

  <!-- カード一覧 -->
  <div class="prompts-grid" id="prompts-list"></div>
</main>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'projectm_prompts_v1';
let currentFilter = 'ALL';
let selectedTool = '';

// ツールタグ選択
document.querySelectorAll('#tool-tags .tag-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#tool-tags .tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedTool = btn.dataset.tool;
  });
});

function getPrompts() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveToStorage(prompts) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(prompts));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function savePrompt() {
  const title  = document.getElementById('inp-title').value.trim();
  const author = document.getElementById('inp-author').value.trim();
  const prompt = document.getElementById('inp-prompt').value.trim();
  const memo   = document.getElementById('inp-memo').value.trim();

  if (!title)  { showToast('タイトルを入力してください'); return; }
  if (!prompt) { showToast('プロンプト本文を入力してください'); return; }
  if (!selectedTool) { showToast('使用ツールを選択してください'); return; }

  const entry = {
    id: Date.now(),
    title, author, prompt, memo,
    tool: selectedTool,
    date: new Date().toLocaleDateString('ja-JP', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' })
  };

  const prompts = getPrompts();
  prompts.unshift(entry);
  saveToStorage(prompts);

  // リセット
  document.getElementById('inp-title').value = '';
  document.getElementById('inp-author').value = '';
  document.getElementById('inp-prompt').value = '';
  document.getElementById('inp-memo').value = '';
  document.querySelectorAll('#tool-tags .tag-btn').forEach(b => b.classList.remove('active'));
  selectedTool = '';

  renderPrompts();
  showToast('✓ 保存しました');
}

function toolClass(tool) {
  const map = {
    'Kling': 'tool-kling',
    'PixVerse': 'tool-pixverse',
    'Runway': 'tool-runway',
    'Sora': 'tool-sora',
    'Midjourney': 'tool-midjourney',
    'GPT Image': 'tool-gptimage',
  };
  return map[tool] || 'tool-other';
}

function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderPrompts();
}

function toggleExpand(id) {
  const el = document.getElementById('prompt-text-' + id);
  el.classList.toggle('expanded');
  const btn = document.getElementById('expand-btn-' + id);
  btn.textContent = el.classList.contains('expanded') ? '折りたたむ' : '全文を見る';
}

function copyPrompt(id) {
  const prompts = getPrompts();
  const entry = prompts.find(p => p.id === id);
  if (!entry) return;
  navigator.clipboard.writeText(entry.prompt).then(() => {
    const el = document.getElementById('copy-ok-' + id);
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1800);
  });
}

function deletePrompt(id) {
  if (!confirm('このプロンプトを削除しますか？')) return;
  const prompts = getPrompts().filter(p => p.id !== id);
  saveToStorage(prompts);
  renderPrompts();
  showToast('削除しました');
}

function renderPrompts() {
  const all = getPrompts();
  const filtered = currentFilter === 'ALL' ? all : all.filter(p => p.tool === currentFilter);

  // 統計
  document.getElementById('stat-total').textContent = all.length;

  const container = document.getElementById('prompts-list');

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div style="font-size:2rem;opacity:0.3">📝</div>
        <p>まだプロンプトがありません</p>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(entry => `
    <div class="prompt-card">
      <div class="card-header">
        <div class="card-meta">
          <span class="tool-badge ${toolClass(entry.tool)}">${entry.tool}</span>
          ${entry.author ? `<span class="author-tag">by ${entry.author}</span>` : ''}
        </div>
        <span class="card-date">${entry.date}</span>
      </div>
      <div class="card-title">${entry.title}</div>
      <div class="card-prompt" id="prompt-text-${entry.id}">${entry.prompt.replace(/</g,'&lt;')}</div>
      ${entry.memo ? `<div style="margin-top:0.6rem;font-size:0.72rem;color:rgba(232,228,220,0.4);font-family:'Cormorant Garamond',serif;font-style:italic;">📌 ${entry.memo}</div>` : ''}
      <div class="card-actions">
        <button class="action-btn" id="expand-btn-${entry.id}" onclick="toggleExpand(${entry.id})">全文を見る</button>
        <button class="action-btn" onclick="copyPrompt(${entry.id})">コピー</button>
        <button class="action-btn" onclick="deletePrompt(${entry.id})" style="color:rgba(247,213,220,0.5)">削除</button>
        <span class="copy-success" id="copy-ok-${entry.id}">✓ コピーしました</span>
      </div>
    </div>
  `).join('');
}

renderPrompts();
</script>
</body>
</html>
