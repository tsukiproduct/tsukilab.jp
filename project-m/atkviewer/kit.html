<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="format-detection" content="telephone=no, email=no">
<title>脳波映像送信機 BVI型 — VISUAL LINK TERMINAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#521c2e;            /* 設定資料の臙脂 */
  --bg-deep:#3d1422;
  --pink:#f0b3c4;          /* 本体フレームのピンク */
  --pink-dim:#c98da0;
  --chrome:#cdd3da;
  --cyan:#57d8ff;          /* レンズ青発光 */
  --cyan-deep:#2aa8d8;
  --ink:#f6e9ee;
  --ink-dim:#d9b8c4;
  --line:rgba(240,179,196,.28);
  --panel:rgba(28,9,17,.55);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:radial-gradient(120% 120% at 50% 0%, var(--bg) 0%, var(--bg-deep) 100%);
  color:var(--ink);
  font-family:'Noto Sans JP',sans-serif;
  overflow:hidden;
}
.mono{font-family:'Chakra Petch',monospace}

/* ============ 共通レイヤー ============ */
.stage{position:fixed;inset:0;display:none}
.stage.active{display:block}

/* ============ ① 起動シーケンス ============ */
#bootCanvas{position:absolute;inset:0;width:100%;height:100%}
#bootHud{position:absolute;inset:0;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:calc(16px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom))}
.hud-top{display:flex;justify-content:space-between;align-items:flex-start;font-size:11px;letter-spacing:.14em;color:var(--ink-dim)}
.hud-title{font-size:13px;font-weight:700;color:var(--pink);letter-spacing:.2em}
.hud-title small{display:block;font-weight:400;font-size:10px;color:var(--ink-dim);letter-spacing:.16em;margin-top:4px}
#bootStatus{font-size:11px;letter-spacing:.18em;color:var(--cyan);text-shadow:0 0 10px rgba(87,216,255,.6)}
#skipBtn{
  pointer-events:auto;align-self:flex-end;
  background:transparent;border:1px solid var(--line);color:var(--ink-dim);
  font-family:'Chakra Petch',monospace;font-size:12px;letter-spacing:.2em;
  padding:12px 22px;border-radius:2px;cursor:pointer;min-height:48px;
  transition:all .2s;
}
#skipBtn:hover,#skipBtn:focus-visible{border-color:var(--cyan);color:var(--cyan)}
#flash{position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,#dff6ff 0%,#57d8ff 45%,transparent 75%);opacity:0;pointer-events:none;transition:opacity .5s}

/* ============ ② 接続画面 ============ */
#connect{background:radial-gradient(120% 120% at 50% 0%,var(--bg) 0%,var(--bg-deep) 100%)}
.connect-wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;padding:24px;text-align:center}
.connect-model{font-size:11px;letter-spacing:.3em;color:var(--ink-dim)}
.connect-head{font-size:clamp(18px,4.5vw,26px);font-weight:700;letter-spacing:.24em;color:var(--pink)}
#eeg{width:min(560px,86vw);height:110px;border:1px solid var(--line);border-radius:4px;background:rgba(0,0,0,.25)}
.sync-row{display:flex;align-items:center;gap:14px;width:min(560px,86vw)}
.sync-bar{flex:1;height:6px;border:1px solid var(--line);border-radius:3px;overflow:hidden}
.sync-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--cyan-deep),var(--cyan));box-shadow:0 0 12px rgba(87,216,255,.7);transition:width .25s}
#syncPct{font-size:15px;color:var(--cyan);min-width:64px;text-align:right;text-shadow:0 0 10px rgba(87,216,255,.5)}
#connLog{min-height:72px;font-size:12px;line-height:2;letter-spacing:.1em;color:var(--ink-dim)}
#connLog .ok{color:var(--cyan)}

/* ============ ③ 閲覧UI ============ */
#viewerUI{display:none;flex-direction:column;height:100%}
#viewerUI.active{display:flex}
.v-head{
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
  border-bottom:1px solid var(--line);flex:none;
}
.v-brand{font-size:12px;font-weight:700;letter-spacing:.18em;color:var(--pink);white-space:nowrap}
.v-brand small{display:block;font-weight:400;font-size:9px;color:var(--ink-dim);letter-spacing:.14em;margin-top:2px}
.v-meters{display:flex;gap:14px;font-size:10px;letter-spacing:.12em;color:var(--ink-dim);white-space:nowrap}
.v-meters b{color:var(--cyan);font-weight:600}
.blink{animation:blink 2.2s steps(2) infinite}
@keyframes blink{50%{opacity:.35}}

.v-body{flex:1;min-height:0;display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* --- スクリーン枠(ゴーグル越しの視界) --- */
.screen-shell{position:relative;flex:none;padding:14px 14px 0}
.screen-frame{
  position:relative;border-radius:18px;overflow:hidden;
  border:2px solid rgba(240,179,196,.4);
  background:#000;
  box-shadow:0 0 0 6px rgba(28,9,17,.6), 0 0 34px rgba(87,216,255,.15), inset 0 0 60px rgba(0,0,0,.6);
  aspect-ratio:16/9;
}
.screen-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0;transition:filter .4s}
#idleScreen{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  color:var(--ink-dim);font-size:12px;letter-spacing:.22em;text-align:center;padding:16px;
  background:
    repeating-linear-gradient(0deg,rgba(87,216,255,.04) 0 1px,transparent 1px 3px),
    radial-gradient(80% 80% at 50% 50%,#10202a 0%,#050a0e 100%);
}
#idleScreen .big{font-size:clamp(16px,4vw,22px);color:var(--cyan);letter-spacing:.3em;text-shadow:0 0 14px rgba(87,216,255,.6)}

/* オーバーレイ群(常にクリック透過) */
.ovl{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .35s}
.ovl-scan{background:repeating-linear-gradient(0deg,rgba(0,0,0,.28) 0 1px,transparent 1px 3px)}
.ovl-scan-g{background:repeating-linear-gradient(0deg,rgba(0,40,0,.35) 0 1px,transparent 1px 3px)}
.ovl-rgb{background:repeating-linear-gradient(90deg,rgba(255,0,60,.05) 0 1px,rgba(0,255,120,.05) 1px 2px,rgba(0,90,255,.05) 2px 3px)}
.ovl-vig{background:radial-gradient(105% 105% at 50% 50%,transparent 58%,rgba(0,0,0,.55) 100%)}
.ovl-glass{background:linear-gradient(115deg,transparent 0%,rgba(255,255,255,.07) 28%,transparent 34%,transparent 62%,rgba(255,255,255,.045) 78%,transparent 86%)}
.ovl-grain{mix-blend-mode:overlay}
.ovl-flicker{background:rgba(200,255,255,.03)}
@keyframes flick{0%,100%{opacity:.9}50%{opacity:.55}92%{opacity:1}}
@keyframes weave{0%,100%{transform:translate(0,0)}25%{transform:translate(.4px,-.5px)}50%{transform:translate(-.4px,.4px)}75%{transform:translate(.3px,.5px)}}
.filter-badge{
  position:absolute;top:10px;right:12px;font-size:10px;letter-spacing:.22em;
  color:var(--cyan);background:rgba(0,0,0,.45);border:1px solid rgba(87,216,255,.4);
  padding:4px 10px;border-radius:2px;opacity:0;transition:opacity .35s;pointer-events:none;
  font-family:'Chakra Petch',monospace;
}

/* --- フィルター定義 --- */
.f-crt80 iframe{filter:saturate(1.4) contrast(1.18) brightness(1.04) blur(.4px)}
.f-crt80 .ovl-scan,.f-crt80 .ovl-rgb,.f-crt80 .ovl-vig,.f-crt80 .ovl-glass{opacity:1}
.f-crt80 .ovl-flicker{opacity:1;animation:flick .12s steps(2) infinite}
.f-crt80 iframe{animation:weave 1.6s steps(4) infinite}
.f-green iframe{filter:grayscale(1) brightness(1.05) contrast(1.3) sepia(1) hue-rotate(52deg) saturate(4.4)}
.f-green .ovl-scan-g,.f-green .ovl-vig,.f-green .ovl-glass{opacity:1}
.f-green .ovl-flicker{opacity:1;animation:flick .18s steps(2) infinite}
.f-film iframe{filter:sepia(.5) saturate(.72) contrast(1.06) brightness(.96)}
.f-film .ovl-grain,.f-film .ovl-vig{opacity:1}
.f-film iframe{animation:weave 1.1s steps(3) infinite}
.f-hires iframe{filter:saturate(1.65) contrast(1.28) brightness(1.07)}
.f-hires .ovl-glass{opacity:1}
.screen-frame.f-crt80,.screen-frame.f-green{border-radius:26px}
.screen-frame.on .filter-badge{opacity:1}

/* --- 入力・フィルターボタン --- */
.ctrl{padding:12px 14px;display:flex;flex-direction:column;gap:10px;flex:none}
.url-row{display:flex;gap:8px}
#urlInput{
  flex:1;min-width:0;background:var(--panel);border:1px solid var(--line);border-radius:4px;
  color:var(--ink);font-family:'Chakra Petch',monospace;font-size:13px;
  padding:13px 14px;min-height:48px;outline:none;transition:border-color .2s;
}
#urlInput::placeholder{color:rgba(217,184,196,.5)}
#urlInput:focus-visible{border-color:var(--cyan)}
#loadBtn{
  background:linear-gradient(180deg,#f4c3d2,#e39fb4);color:#3d1422;border:0;border-radius:4px;
  font-weight:700;font-size:13px;letter-spacing:.12em;padding:0 20px;min-height:48px;min-width:88px;
  cursor:pointer;transition:transform .12s, box-shadow .2s;box-shadow:0 2px 10px rgba(0,0,0,.35);
}
#loadBtn:hover{box-shadow:0 2px 16px rgba(240,179,196,.4)}
#loadBtn:active{transform:scale(.97)}
.filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fbtn{
  flex:none;background:transparent;border:1px solid var(--line);color:var(--ink-dim);
  font-family:'Noto Sans JP',sans-serif;font-size:12px;letter-spacing:.06em;
  padding:11px 16px;border-radius:999px;cursor:pointer;min-height:44px;transition:all .2s;white-space:nowrap;
}
.fbtn:hover{border-color:var(--pink);color:var(--pink)}
.fbtn.sel{background:rgba(87,216,255,.12);border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 12px rgba(87,216,255,.25)}
#errMsg{display:none;font-size:12px;color:#ffb0b0;letter-spacing:.06em}

/* --- 受信情報パネル(oEmbed) --- */
.info{margin:2px 14px calc(18px + env(safe-area-inset-bottom));border:1px solid var(--line);border-radius:8px;background:var(--panel);overflow:hidden}
.info-head{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--line);font-size:10px;letter-spacing:.24em;color:var(--ink-dim)}
.info-head::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
.info-body{display:flex;gap:14px;padding:14px;align-items:flex-start}
.info-thumb{flex:none;width:112px;aspect-ratio:16/9;border-radius:4px;object-fit:cover;border:1px solid var(--line);background:#000}
.info-txt{min-width:0}
#vTitle{font-size:14px;font-weight:700;line-height:1.55;overflow-wrap:anywhere}
#vChannel{margin-top:6px;font-size:12px;color:var(--ink-dim);letter-spacing:.04em}
#vChannel b{color:var(--pink);font-weight:500}
.info-empty{padding:18px 14px;font-size:12px;color:rgba(217,184,196,.55);letter-spacing:.14em;text-align:center}

@media (max-width:520px){
  .v-meters span:nth-child(2){display:none}
  .info-thumb{width:92px}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>
<body>

<!-- ================= ① 起動シーケンス ================= -->
<div class="stage active" id="boot">
  <canvas id="bootCanvas"></canvas>
  <div id="bootHud">
    <div class="hud-top">
      <div class="hud-title mono">EEG-BVI-G01<small>脳波映像送信機(BVI型)</small></div>
      <div class="mono" id="bootStatus">SYSTEM BOOT...</div>
    </div>
    <button id="skipBtn" class="mono">SKIP ▸</button>
  </div>
  <div id="flash"></div>
</div>

<!-- ================= ② 接続画面 ================= -->
<div class="stage" id="connect">
  <div class="connect-wrap">
    <div class="connect-model mono">EEG-BVI-G01 / QUANTUM BAND 120GHz</div>
    <div class="connect-head">脳波同期シーケンス</div>
    <canvas id="eeg"></canvas>
    <div class="sync-row">
      <div class="sync-bar"><div class="sync-fill" id="syncFill"></div></div>
      <div class="mono" id="syncPct">0%</div>
    </div>
    <div class="mono" id="connLog"></div>
  </div>
</div>

<!-- ================= ③ 閲覧UI ================= -->
<div class="stage" id="viewer">
  <div id="viewerUI">
    <header class="v-head">
      <div class="v-brand mono">BVI VISUAL LINK<small>脳波映像送信機 端末モード</small></div>
      <div class="v-meters mono">
        <span>LINK <b class="blink">●</b></span>
        <span>LATENCY <b>2ms</b></span>
        <span>BATT <b>620g/98%</b></span>
      </div>
    </header>

    <div class="v-body">
      <div class="screen-shell">
        <div class="screen-frame" id="frame">
          <div id="playerSlot"></div>
          <div id="idleScreen">
            <div class="big mono">AWAITING SIGNAL</div>
            <div>下の入力欄に YouTube のURLを転送してください</div>
          </div>
          <div class="ovl ovl-scan"></div>
          <div class="ovl ovl-scan-g"></div>
          <div class="ovl ovl-rgb"></div>
          <div class="ovl ovl-vig"></div>
          <div class="ovl ovl-glass"></div>
          <div class="ovl ovl-flicker"></div>
          <svg class="ovl ovl-grain" width="100%" height="100%"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2"/></filter><rect width="100%" height="100%" filter="url(#n)" opacity=".16"/></svg>
          <div class="filter-badge" id="badge"></div>
        </div>
      </div>

      <div class="ctrl">
        <div class="url-row">
          <input id="urlInput" type="url" inputmode="url" placeholder="https://www.youtube.com/watch?v=..." aria-label="YouTube動画のURL">
          <button id="loadBtn">受信</button>
        </div>
        <div id="errMsg">信号を解析できません。YouTubeの動画URLをご確認ください。</div>
        <div class="filters" role="group" aria-label="映像フィルター">
          <button class="fbtn sel" data-f="">標準</button>
          <button class="fbtn" data-f="f-crt80">80年代ブラウン管</button>
          <button class="fbtn" data-f="f-green">黄緑CRT</button>
          <button class="fbtn" data-f="f-film">8mmフィルム</button>
          <button class="fbtn" data-f="f-hires">強制ハイレゾ</button>
        </div>
      </div>

      <div class="info">
        <div class="info-head mono">RECEIVED METADATA — 受信情報</div>
        <div class="info-empty" id="infoEmpty">未受信</div>
        <div class="info-body" id="infoBody" style="display:none">
          <img class="info-thumb" id="vThumb" alt="サムネイル">
          <div class="info-txt">
            <div id="vTitle"></div>
            <div id="vChannel">CH: <b id="vChName"></b></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
<script>
"use strict";
/* ============================================================
   ① 起動シーケンス:BVI型をプロシージャルモデリングして回転→装着
   ============================================================ */
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
const bootStage = document.getElementById('boot');
const connectStage = document.getElementById('connect');
const viewerStage = document.getElementById('viewer');
let bootDone = false, renderer, rafId;

const MAT = {
  pink : new THREE.MeshStandardMaterial({color:0xf0b3c4, roughness:.55, metalness:.1}),
  pinkD: new THREE.MeshStandardMaterial({color:0xd897ab, roughness:.6,  metalness:.1}),
  chrome:new THREE.MeshStandardMaterial({color:0xd8dde3, roughness:.18, metalness:.95}),
  dark : new THREE.MeshStandardMaterial({color:0x5a6068, roughness:.35, metalness:.8}),
  cable: new THREE.MeshStandardMaterial({color:0x2c4fa0, roughness:.5,  metalness:.4}),
  lens : new THREE.MeshStandardMaterial({color:0x0a2030, roughness:.05, metalness:.9}),
  glow : new THREE.MeshBasicMaterial({color:0x57d8ff}),
  glow2: new THREE.MeshBasicMaterial({color:0xbfeeff}),
  grill: new THREE.MeshStandardMaterial({color:0x8fe8ff, roughness:.7, metalness:.2, emissive:0x1e7a99, emissiveIntensity:.8}),
};

function buildDevice(){
  const g = new THREE.Group();

  // --- ヘッドバンドフレーム(左右対称の閉ループ・ピンク) ---
  const bandShape = new THREE.CatmullRomCurve3([
    new THREE.Vector3( 1.45,  .05,  .55),
    new THREE.Vector3( 1.60,  .12, -0.35),
    new THREE.Vector3( 0.85,  .28, -1.25),
    new THREE.Vector3( 0.00,  .34, -1.45),
    new THREE.Vector3(-0.85,  .28, -1.25),
    new THREE.Vector3(-1.60,  .12, -0.35),
    new THREE.Vector3(-1.45,  .05,  .55),
  ]);
  g.add(new THREE.Mesh(new THREE.TubeGeometry(bandShape, 64, .13, 12, false), MAT.pink));

  // --- 後頭部クッションパッド ---
  const pad = new THREE.Mesh(new THREE.CapsuleGeometryFallback(.16, 1.0), MAT.pinkD);
  pad.position.set(0,-.18,-1.38); pad.rotation.z = Math.PI/2;
  g.add(pad);

  // --- 制御ボックス(後頭部上・クロム) ---
  const box = new THREE.Mesh(new THREE.BoxGeometry(.62,.5,.34), MAT.chrome);
  box.position.set(0,.62,-1.28); g.add(box);
  const boxPanel = new THREE.Mesh(new THREE.BoxGeometry(.44,.3,.02), MAT.dark);
  boxPanel.position.set(0,.62,-1.10); g.add(boxPanel);

  // --- ケーブル束(制御ボックス→左右レンズ部へ・青) ---
  for(let s=-1;s<=1;s+=2){
    for(let i=0;i<4;i++){
      const wob=.06*i;
      const c=new THREE.CatmullRomCurve3([
        new THREE.Vector3(s*.2,.68,-1.3),
        new THREE.Vector3(s*(.9+wob),.55+.1*Math.sin(i),-1.0),
        new THREE.Vector3(s*(1.5+wob),.35,-0.2),
        new THREE.Vector3(s*1.42,.18,.45),
      ]);
      g.add(new THREE.Mesh(new THREE.TubeGeometry(c,40,.025,6,false), MAT.cable));
    }
    // 可動リンク機構(機械アーム・クロム)
    const arm=new THREE.CatmullRomCurve3([
      new THREE.Vector3(s*.35,.5,-1.32),
      new THREE.Vector3(s*1.2,.42,-0.7),
      new THREE.Vector3(s*1.55,.22,.1),
    ]);
    g.add(new THREE.Mesh(new THREE.TubeGeometry(arm,32,.05,8,false), MAT.chrome));
    for(let j=0;j<3;j++){
      const joint=new THREE.Mesh(new THREE.SphereGeometry(.085,12,12), MAT.dark);
      joint.position.copy(arm.getPoint(.25+j*.3)); g.add(joint);
    }
  }

  // --- 額部フレーム(ピンクの庇) ---
  const brow = new THREE.Mesh(new THREE.BoxGeometry(1.9,.3,.34), MAT.pink);
  brow.position.set(0,.62,.62); g.add(brow);
  const jewel = new THREE.Mesh(new THREE.BoxGeometry(.3,.1,.05), MAT.glow);
  jewel.position.set(0,.66,.80); g.add(jewel);

  // --- レンズユニット×2(クロムリム+青発光コア) ---
  const lensGroup = new THREE.Group();
  for(let s=-1;s<=1;s+=2){
    const u = new THREE.Group();
    const rim  = new THREE.Mesh(new THREE.CylinderGeometry(.52,.56,.34,40), MAT.chrome);
    rim.rotation.x = Math.PI/2; u.add(rim);
    const rim2 = new THREE.Mesh(new THREE.TorusGeometry(.52,.05,10,40), MAT.dark);
    rim2.position.z=.18; u.add(rim2);
    const glass= new THREE.Mesh(new THREE.CylinderGeometry(.44,.44,.05,40), MAT.lens);
    glass.rotation.x=Math.PI/2; glass.position.z=.16; u.add(glass);
    const core = new THREE.Mesh(new THREE.CircleGeometry(.26,32), MAT.glow);
    core.position.z=.20; u.add(core);
    const core2= new THREE.Mesh(new THREE.CircleGeometry(.12,32), MAT.glow2);
    core2.position.z=.21; u.add(core2);
    const light= new THREE.PointLight(0x57d8ff, 1.4, 3.5);
    light.position.set(0,0,.5); u.add(light);
    // ボルト飾り
    for(let a=0;a<4;a++){
      const b=new THREE.Mesh(new THREE.CylinderGeometry(.05,.05,.08,8), MAT.dark);
      b.rotation.x=Math.PI/2;
      b.position.set(Math.cos(a*Math.PI/2)*.56, Math.sin(a*Math.PI/2)*.56, .1);
      u.add(b);
    }
    u.position.set(s*.62,.12,.72);
    lensGroup.add(u);

    // サイドスピーカー(青発光グリル)
    const spk=new THREE.Mesh(new THREE.CylinderGeometry(.28,.28,.16,28), MAT.chrome);
    spk.rotation.z=Math.PI/2; spk.position.set(s*1.44,.12,.5); g.add(spk);
    const mesh=new THREE.Mesh(new THREE.CircleGeometry(.2,24), MAT.grill);
    mesh.rotation.y=s*Math.PI/2; mesh.position.set(s*1.53,.12,.5); g.add(mesh);
  }
  // ノーズブリッジ
  const nose=new THREE.Mesh(new THREE.TorusGeometry(.2,.05,10,24,Math.PI), MAT.pinkD);
  nose.position.set(0,-.06,.78); nose.rotation.z=Math.PI; g.add(nose);
  const plate=new THREE.Mesh(new THREE.BoxGeometry(.5,.5,.1), MAT.chrome);
  plate.position.set(0,.3,.68); g.add(plate);

  g.add(lensGroup);
  return g;
}
// CapsuleGeometry は r142+ のため簡易代替(円柱+両端球)
THREE.CapsuleGeometryFallback = function(r,len){
  const geo = new THREE.CylinderGeometry(r,r,len,16);
  return geo;
};

function startBoot(){
  const canvas = document.getElementById('bootCanvas');
  renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  const scene = new THREE.Scene();
  const cam = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, .1, 50);
  cam.position.set(0,.6,6.2);

  scene.add(new THREE.AmbientLight(0xffd9e4,.55));
  const key = new THREE.DirectionalLight(0xffffff,1.2); key.position.set(3,4,5); scene.add(key);
  const rimL= new THREE.DirectionalLight(0x57d8ff,.7);  rimL.position.set(-4,2,-3); scene.add(rimL);

  const device = buildDevice();
  scene.add(device);

  function resize(){
    renderer.setSize(innerWidth, innerHeight, false);
    cam.aspect = innerWidth/innerHeight; cam.updateProjectionMatrix();
  }
  resize(); addEventListener('resize', resize);

  const status = document.getElementById('bootStatus');
  const T_ROT = 4200, T_WEAR = 2200;   // 回転→装着
  const t0 = performance.now();
  const ease = t => t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;

  function frame(now){
    const t = now - t0;
    if(t < T_ROT){
      device.rotation.y = (t/T_ROT) * Math.PI*2 + Math.PI;   // 背面から一周
      device.position.y = Math.sin(t*.0016)*.08;
      status.textContent = 'DEVICE SCAN... ' + Math.min(99,Math.floor(t/T_ROT*100)) + '%';
    }else if(t < T_ROT+T_WEAR){
      const p = ease((t-T_ROT)/T_WEAR);
      device.rotation.y = 0;
      // カメラがレンズの中心へ吸い込まれる=装着
      cam.position.z = 6.2 - p*5.1;
      cam.position.y = .6 - p*.45;
      MAT.glow.color.setHSL(.55,1,.5+.4*p);
      status.textContent = 'MOUNTING... 装着シーケンス';
      if(p>.82) document.getElementById('flash').style.opacity = (p-.82)/.18;
    }else{
      return finishBoot();
    }
    renderer.render(scene,cam);
    rafId = requestAnimationFrame(frame);
  }
  rafId = requestAnimationFrame(frame);
}
function finishBoot(){
  if(bootDone) return; bootDone = true;
  cancelAnimationFrame(rafId);
  if(renderer) renderer.dispose();
  bootStage.classList.remove('active');
  connectStage.classList.add('active');
  startConnect();
}
document.getElementById('skipBtn').addEventListener('click', finishBoot);
if(reduceMotion){ finishBoot(); } else { startBoot(); }

/* ============================================================
   ② 接続画面:脳波波形+同期率+ログ
   ============================================================ */
function startConnect(){
  const cv = document.getElementById('eeg');
  const ctx = cv.getContext('2d');
  function fit(){ cv.width = cv.clientWidth*devicePixelRatio; cv.height = cv.clientHeight*devicePixelRatio; }
  fit();
  let ph=0, alive=true;
  function wave(){
    if(!alive) return;
    ctx.clearRect(0,0,cv.width,cv.height);
    ctx.lineWidth = 2*devicePixelRatio;
    ctx.strokeStyle = '#57d8ff';
    ctx.shadowColor = '#57d8ff'; ctx.shadowBlur = 10*devicePixelRatio;
    ctx.beginPath();
    for(let x=0;x<cv.width;x+=3){
      const n = Math.sin(x*.02+ph)*Math.sin(x*.007+ph*.6);
      const spike = (Math.sin(x*.11+ph*2.4)>.96)? (Math.random()*.9):0;
      const y = cv.height/2 + (n*.28+spike)*cv.height*.42;
      x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.stroke(); ph+=.12;
    requestAnimationFrame(wave);
  }
  if(!reduceMotion) wave();

  const fill=document.getElementById('syncFill'), pct=document.getElementById('syncPct'), log=document.getElementById('connLog');
  const steps=[
    [12,'脳波パターン取得中…'],
    [43,'量子帯域 120GHz リンク確立…'],
    [78,'視覚野マッピング 完了'],
    [100,'<span class="ok">NEURAL LINK ESTABLISHED — 映像受信の準備が整いました</span>'],
  ];
  let i=0;
  function step(){
    if(i>=steps.length){ alive=false; setTimeout(showViewer, reduceMotion?0:700); return; }
    const [p,msg]=steps[i++];
    fill.style.width=p+'%'; pct.textContent=p+'%';
    log.innerHTML += msg+'<br>';
    setTimeout(step, reduceMotion?0:800);
  }
  setTimeout(step, reduceMotion?0:400);
}
function showViewer(){
  connectStage.classList.remove('active');
  viewerStage.classList.add('active');
  document.getElementById('viewerUI').classList.add('active');
}

/* ============================================================
   ③ 閲覧UI:URL→再生+oEmbedメタデータ+フィルター
   ============================================================ */
const frameEl=document.getElementById('frame');
const slot=document.getElementById('playerSlot');
const idle=document.getElementById('idleScreen');
const err=document.getElementById('errMsg');
const badge=document.getElementById('badge');
const FILTER_NAMES={'':'','f-crt80':'CRT-1980','f-green':'PHOSPHOR-GRN','f-film':'FILM-8MM','f-hires':'FORCE-HIRES'};

function extractId(url){
  const m=(url||'').match(/(?:youtube\.com\/(?:watch\?(?:.*&)?v=|shorts\/|embed\/|live\/)|youtu\.be\/)([\w-]{11})/);
  return m?m[1]:null;
}
async function fetchMeta(id){
  const target='https://www.youtube.com/watch?v='+id;
  const urls=[
    'https://www.youtube.com/oembed?format=json&url='+encodeURIComponent(target),
    'https://noembed.com/embed?url='+encodeURIComponent(target),
  ];
  for(const u of urls){
    try{
      const r=await fetch(u);
      if(r.ok){ const j=await r.json(); if(j && j.title) return j; }
    }catch(e){/* 次の経路へ */}
  }
  return null;
}
async function load(){
  err.style.display='none';
  const id=extractId(document.getElementById('urlInput').value.trim());
  if(!id){ err.style.display='block'; return; }
  slot.innerHTML='<iframe src="https://www.youtube-nocookie.com/embed/'+id+'?autoplay=1&rel=0&playsinline=1" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen title="受信映像"></iframe>';
  idle.style.display='none';
  frameEl.classList.add('on');

  const emptyEl=document.getElementById('infoEmpty'), bodyEl=document.getElementById('infoBody');
  const meta=await fetchMeta(id);
  if(meta){
    document.getElementById('vTitle').textContent=meta.title||'—';
    document.getElementById('vChName').textContent=meta.author_name||'—';
    const th=document.getElementById('vThumb');
    th.src=meta.thumbnail_url||('https://i.ytimg.com/vi/'+id+'/hqdefault.jpg');
    emptyEl.style.display='none'; bodyEl.style.display='flex';
  }else{
    emptyEl.textContent='メタデータ受信不可(再生には影響ありません)';
    emptyEl.style.display='block'; bodyEl.style.display='none';
  }
}
document.getElementById('loadBtn').addEventListener('click', load);
document.getElementById('urlInput').addEventListener('keydown', e=>{ if(e.key==='Enter') load(); });

document.querySelectorAll('.fbtn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('sel'));
    btn.classList.add('sel');
    frameEl.className='screen-frame on';
    const f=btn.dataset.f;
    if(f) frameEl.classList.add(f);
    badge.textContent=FILTER_NAMES[f];
  });
});
</script>
