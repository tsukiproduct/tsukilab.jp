<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#050506">
  <title>SUMMER INFECTION</title>
  <link rel="stylesheet" href="./styles.css">
  <script type="importmap">
    {"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/"}}
  </script>
</head>
<body>
  <main id="shell" aria-label="SUMMER INFECTION game">
    <canvas id="game" aria-label="3D game view"></canvas>
    <section id="hud" class="hidden" aria-live="polite">
      <div class="stage-block"><span id="stageNumber">STAGE 1/4</span><strong id="stageName">SAMATEI FESTIVAL</strong></div>
      <div class="vital-block"><span>VITAL</span><div class="meter"><i id="hpBar"></i></div></div>
      <div class="stats"><span>LV <b id="level">1</b></span><span>KILL <b id="kills">0</b></span></div>
      <time id="timer">60</time>
      <div id="bossMeter" class="boss-meter hidden"><span>INFECTED GIRL</span><div class="meter"><i id="bossBar"></i></div></div>
    </section>
    <section id="curtain" class="curtain">
      <p id="eyebrow">A PS1 SURVIVAL HORROR</p>
      <h1 id="title"><span>SUMMER</span> INFECTION</h1>
      <p id="subtitle">SURVIVE THE NIGHT</p>
      <button id="startButton" type="button">START</button>
      <p id="hint">WASD / ARROW KEYS</p>
    </section>
    <div id="message" class="message hidden"></div>
    <button id="pauseButton" class="icon-button hidden" type="button" aria-label="ポーズ" title="ポーズ">Ⅱ</button>
    <div id="touchControls" aria-label="移動操作">
      <button class="up" data-key="ArrowUp" type="button" aria-label="上">▲</button>
      <button class="left" data-key="ArrowLeft" type="button" aria-label="左">◀</button>
      <button class="right" data-key="ArrowRight" type="button" aria-label="右">▶</button>
      <button class="down" data-key="ArrowDown" type="button" aria-label="下">▼</button>
    </div>
  </main>
  <script type="module" src="./game.js"></script>
</body>
</html>
