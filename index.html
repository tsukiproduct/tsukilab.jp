<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月ラボ — tsukilab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=EB+Garamond:ital,wght@1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background-color: #ebe6db;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Noto Serif JP', serif;
    }

    .container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .title {
      font-family: 'Noto Serif JP', serif;
      font-weight: 400;
      font-size: clamp(2.4rem, 5vw, 3.6rem);
      color: #2c2420;
      letter-spacing: 0.05em;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: clamp(0.85rem, 1.5vw, 1rem);
      color: #8b4c3c;
      letter-spacing: 0.35em;
      margin-bottom: 1.6rem;
    }

    .divider {
      width: 2.4rem;
      height: 1px;
      background-color: #8b4c3c;
      margin-bottom: 2rem;
    }

    .body-text {
      font-family: 'Noto Serif JP', serif;
      font-weight: 300;
      color: #3a3230;
      line-height: 2.1;
    }

    .body-text .en {
      font-size: clamp(0.8rem, 1.4vw, 0.92rem);
      letter-spacing: 0.15em;
      display: block;
      margin-bottom: 0.5rem;
    }

    .body-text .ja {
      font-size: clamp(0.7rem, 1.3vw, 0.82rem);
      letter-spacing: 0.08em;
      display: block;
      line-height: 2;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">月ラボ</h1>
    <p class="subtitle">tsukilab</p>
    <div class="divider"></div>
    <div class="body-text">
      <span class="en">This is Tsukilab.</span>
      <span class="ja">ただいま準備を進めております。<br>サービス開始まで、いましばらくお待ちください。</span>
    </div>
  </div>
</body>
</html>
